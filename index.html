<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>金璐 | Lu Jin - Personal Resume</title>
    <style>
        :root {
            --bg-base: #f7f8fa;
            --card-bg: #ffffff;
            --text-main: #34495e;
            --text-sub: #7f8c8d;
            --accent: #95a5a6; 
            --accent-light: #d5dbdb;
            --link-blue: #5499c7;
            --shadow: 0 4px 20px rgba(0,0,0,0.04);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, "Noto Sans SC", "PingFang SC", sans-serif; }

        body { background-color: var(--bg-base); color: var(--text-main); line-height: 1.7; }

        #hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 0 20px; }

        .avatar-box {
            width: 140px; height: 140px; margin-bottom: 25px; border-radius: 50%;
            border: 3px solid #fff; box-shadow: var(--shadow); overflow: hidden;
            display: flex; justify-content: center; align-items: center; background: #fff;
        }
        .avatar-box img { width: 100%; height: 100%; object-fit: cover; }

        h1 { font-size: 2rem; font-weight: 500; margin-bottom: 8px; color: var(--text-main); letter-spacing: 1px; }
        .typewriter-container { height: 24px; font-size: 1rem; color: var(--text-sub); }

        .skip-btn {
            margin-top: 50px; padding: 10px 24px; border: 1px solid var(--accent);
            background: transparent; color: var(--text-sub); cursor: pointer;
            border-radius: 2px; transition: all 0.3s; font-size: 0.8rem;
        }
        .skip-btn:hover { background: var(--text-main); color: #fff; border-color: var(--text-main); }

        .resume-content { max-width: 800px; margin: 0 auto; padding: 20px 20px 80px; display: none; }
        .resume-active { display: block; animation: fadeIn 0.8s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .section-box { background: var(--card-bg); padding: 40px; border-radius: 12px; margin-bottom: 30px; box-shadow: var(--shadow); }
        h2 { font-size: 1.25rem; margin-bottom: 30px; color: var(--text-main); display: flex; align-items: center; }
        h2::before { content: ""; display: inline-block; width: 4px; height: 18px; background: var(--accent); margin-right: 12px; border-radius: 2px; }

        .item { margin-bottom: 35px; }
        .item-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
        .title-main { font-size: 1.05rem; font-weight: 600; color: var(--text-main); }
        .date-tag { font-size: 0.85rem; color: var(--text-sub); }
        .item-sub { font-size: 0.9rem; color: var(--accent); margin-bottom: 12px; font-weight: 500; }
        
        ul { list-style: none; }
