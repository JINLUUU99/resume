<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>金璐的个人简历</title>
    <style>
        /* 页面基础样式 */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0066cc, #00ccff);
            overflow: hidden;
            color: #fff;
        }

        /* 背景动效 */
        .wave {
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 200px;
            background: rgba(255, 255, 255, 0.2);
            animation: waveAnimation 6s infinite;
        }

        @keyframes waveAnimation {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        /* 打字机效果 */
        .typing {
            font-size: 24px;
            white-space: nowrap;
            overflow: hidden;
            border-right: 3px solid #fff;
            width: 0;
            animation: typing 4s steps(40) 1s forwards, blink 0.75s step-end infinite;
        }

        @keyframes typing {
            from { width: 0; }
            to { width: 100%; }
        }

        @keyframes blink {
            50% { border-color: transparent; }
        }

        /* 头像 */
        .profile-image {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            border-radius: 50%;
            width: 150px;
            height: 150px;
        }

        /* 页面布局 */
        .container {
            position: relative;
            padding: 50px;
            z-index: 2;
        }

        .content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 100vh;
        }

        .text {
            max-width: 60%;
        }

        .text h1, .text h2, .text p {
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <!-- 背景波浪 -->
    <div class="wave"></div>
    
    <!-- 页面内容 -->
    <div class="container">
        <div class="content">
            <div class="text">
                <div class="typing" id="typing"></div>
                <h2>金璐的个人简历</h2>
                <p>电话：18260576882 | 邮箱：894327966@qq.com</p>
                <p>教育经历：清华大学 硕士 | 武汉大学 学士</p>
                <p>工作经历：某三甲医院、拼多多、联通等</p>
                <!-- 更多内容可以继续添加 -->
            </div>
            <img src="your-avatar.jpg" alt="金璐的头像" class="profile-image">
        </div>
    </div>

    <script>
        // JavaScript用于实现打字机效果
        const text = "Hello! 我是金璐, 欢迎浏览我的简历。";
        let index = 0;

        function typeText() {
            if (index < text.length) {
                document.getElementById('typing').textContent += text.charAt(index);
                index++;
                setTimeout(typeText, 100);
            }
        }

        typeText(); // 启动打字机效果
    </script>
</body>
</html>
